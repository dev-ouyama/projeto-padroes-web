<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <title>Quiz</title>
    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="/quiz/quiz.css">
  </head>
  <body>
    <section class="content">
      <h1>Quiz de Perguntas</h1>

      <div id="quiz-container">
        <h2 id="question">Pergunta aqui</h2>
        <div id="answers"></div>
        <button id="next-btn">Próxima</button>
      </div>

      <div id="result-container" style="display: none">
        <h2>Resultado</h2>
        <p id="score"></p>
        <button onclick="restartQuiz()">Reiniciar</button>
      </div>
    </section>
    
    <script src="quiz.js"></script>
  </body>
</html>
